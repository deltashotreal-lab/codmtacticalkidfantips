<!DOCTYPE html>
<html>
<head>
<title>CODM Tactical Kid</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #ff6600, #001f4d, #cc0000, #000000);
    background-size: 400% 400%;
    animation: bgmove 10s ease infinite;
    color: white;
    scroll-behavior: smooth;
    overflow-x: hidden;
}

@keyframes bgmove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

h1 {
    font-size: 55px;
    text-shadow: 0 0 15px black;
}

button {
    padding: 14px 28px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

.card {
    background: rgba(0,0,0,0.35);
    padding: 20px;
    border-radius: 15px;
    margin: 10px;
    width: 300px;
    text-align: center;
}

input, textarea {
    width: 300px;
    padding: 12px;
    margin: 8px;
    border: none;
    border-radius: 8px;
}

textarea {
    height: 120px;
}

.crosshair {
    position: fixed;
    width: 40px;
    height: 40px;
    border: 2px solid white;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
}

.loading {
    width: 300px;
    height: 10px;
    background: rgba(255,255,255,0.2);
    margin-top: 20px;
    border-radius: 5px;
    overflow: hidden;
}

.loading-bar {
    width: 0;
    height: 100%;
    background: white;
    animation: load 4s infinite;
}

@keyframes load {
    0% {width: 0;}
    100% {width: 100%;}
}

.particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    opacity: 0.4;
    animation: float 10s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-100px);}
}
</style>
</head>

<body>

<div class="crosshair" id="crosshair"></div>

<div class="particle" style="left:10%; animation-duration:8s;"></div>
<div class="particle" style="left:30%; animation-duration:10s;"></div>
<div class="particle" style="left:60%; animation-duration:7s;"></div>
<div class="particle" style="left:80%; animation-duration:9s;"></div>

<div class="section">
    <h1>CODM Tactical Kid</h1>
    <button onclick="alert('Mission started! Scroll down!')">Start Mission</button>
    <div class="loading">
        <div class="loading-bar"></div>
    </div>
</div>

<div class="section">
    <h2>Battle Stats</h2>
    <div class="card">🎯 Accuracy Tips</div>
    <div class="card">⚡ Fast Reflex Tricks</div>
    <div class="card">🛡 Loadout Suggestions</div>
</div>

<div class="section">
    <h2>Email Me 📩</h2>

    <input type="email" id="email" placeholder="Your Email">
    <input type="text" id="countrycode" placeholder="Country Code (+91)">
    <input type="text" id="phone" placeholder="Phone Number">
    <textarea id="message" placeholder="Your Message"></textarea>

    <button onclick="sendMail()">Send</button>
</div>

<script>
document.addEventListener('mousemove', function(e) {
    document.getElementById('crosshair').style.left = e.clientX + 'px';
    document.getElementById('crosshair').style.top = e.clientY + 'px';
});

function sendMail() {
    let email = document.getElementById("email").value;
    let countrycode = document.getElementById("countrycode").value;
    let phone = document.getElementById("phone").value;
    let message = document.getElementById("message").value;

    let body =
        "Email: " + email + "%0A" +
        "Country Code: " + countrycode + "%0A" +
        "Phone: " + phone + "%0A" +
        "Message: " + message;

    window.location.href =
        "mailto:aadvikvivek201518@gmail.com?subject=Message from CODM Tactical Kid&body=" + body;
}
</script>

</body>
</html>
